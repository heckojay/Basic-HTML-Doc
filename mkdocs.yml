site_name: HTML User Documentation
site_url: https://htmluserdocs.ca

nav:
  - Home: index.md
  - Installing Visual Studio Code: VsCode-Setup/VsCode-Installation.md
  - Create Your First Website: Basic-HTML/Basic-HTML.md
  - Style Your First Website: CSS-Basics/CSS-Basics.md 
  - View Your First Website: Live-Server/Live-Server.md
  - Glossary: glossary.md
  - Troubleshooting: troubleshooting.md

theme:
  name: material
  font:
    text: Merriweather Sans
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light Mode
      primary: indigo
      accent: indigo
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark Mode
      primary: white
      accent: white

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
